<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Tracker</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Mobile topbar -->
  <header class="topbar" id="topbar">
    <span class="topbar-logo">💰 Finance Tracker</span>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">☰</button>
  </header>

  <!-- App shell -->
  <div class="app-shell">

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar" aria-label="Main navigation">
      <div class="sidebar-logo">💰 Finance Tracker</div>
      <ul class="nav-list">
        <li><a class="nav-link" href="#dashboard">📊 Dashboard</a></li>
        <li><a class="nav-link" href="#transactions">💳 Transactions</a></li>
        <li><a class="nav-link" href="#categories">🏷️ Categories</a></li>
        <li><a class="nav-link" href="#summary">📈 Summary</a></li>
      </ul>
    </nav>

    <!-- Main content -->
    <main class="main-content">

      <section id="page-dashboard"    class="page"></section>
      <section id="page-transactions" class="page"></section>
      <section id="page-categories"   class="page"></section>
      <section id="page-summary"      class="page"></section>

    </main>
  </div>

  <!-- Shared modal -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modal-title" class="modal-title"></h2>
        <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- App scripts — ORDER MATTERS -->
  <script src="js/storage.js"></script>
  <script src="js/categories.js"></script>
  <script src="js/transactions.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/summary.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
